slides:
- type: title
  title: Module 4
  subtitle: UART — UVM+SV Verification
- type: bullets
  title: Learning objectives
  bullets:
  - 'UART UVM agent: Transaction (UartTxTransaction), sequence (UartTxSequence), driver
    (UartTxDriver), monitor (UartTxMonitor), scoreboard (UartTxScoreboard).'
  - 'Interface: uart_tx_if (clk, rst_n, start, data, tx, baud_tick) connects UVM to
    DUT.'
  - 'Loopback check: TX path (driver → DUT → monitor → scoreboard) and RX path (DUT
    rx_valid/rx_data → scoreboard.check_rx_byte).'
- type: bullets
  title: Prerequisites
  bullets:
  - Module 1 (spec → RTL), Module 2 (UVM+SV, uvm_smoke), Module 3 (UART protocol +
    RTL + basic TB).
  - Verilator, Make, C++ compiler, UVM (UVM_HOME or vendored UVM).
