- type: section
  title: Design architecture
- type: image
  title: RTL / block architecture
  image: assets/diagrams/rtl_architecture.png
  caption: 'Module 4: DUT / block hierarchy (see module4/examples/).'
- type: image
  title: Verification environment architecture
  image: assets/diagrams/verification_architecture.png
  caption: 'Module 4: UVM layers, agents, and checkers for this phase.'
- type: bullets
  title: 1. UART DUT (reused from Module 3)
  bullets:
  - 'dut/: `uart_tx`, `uart_rx`, `baud_gen` — identical RTL to `uart_baseline`.'
  - 'Loopback in top: `rx = tx` for closed-loop checking.'
  - 'Why reuse: Upgrade verification (UVM) without touching proven RTL.'
  notes: From MODULE4 Design Architecture.
- type: bullets
  title: 2. UVM testbench hierarchy
  bullets:
  - 'uart_tx_if: virtual interface for driver/monitor.'
  - UartTxTransaction / Sequence / Driver / Monitor / Scoreboard / Agent / Env / Test
    — same pattern as `uvm_smoke`.
  - Monitor reconstructs bytes from the serial `tx` line using UART 8N1 rules.
  notes: From MODULE4 Design Architecture.
- type: bullets
  title: 3. Dual check paths
  bullets:
  - 'TX path: sequence → driver → DUT → monitor → scoreboard (`observed_tx`).'
  - 'RX path: loopback into `uart_rx`; `check_rx_byte()` when `data_valid` asserts.'
  notes: From MODULE4 Design Architecture.
- type: section
  title: Verification & testing methods
- type: image
  title: Testing and closure flow
  image: assets/diagrams/testing_methods.png
  caption: 'Module 4: how tests, checks, and metrics close verification goals.'
- type: bullets
  title: 1. Directed UART regression
  bullets:
  - Sequence sends 0x00, 0x01, 0x55, 0xAA, 0xFF — repeatable regression before randomization.
  notes: From MODULE4 Verification & Testing Methods.
- type: bullets
  title: 2. Scoreboard strategy
  bullets:
  - Expected queue loaded in test; compare to monitor-reconstructed TX and to RX hook
    data.
  - Fail fast on mismatch; read UVM SCOREBOARD summary at end of run.
  notes: From MODULE4 Verification & Testing Methods.
- type: bullets
  title: 3. What to add next
  bullets:
  - Random baud, framing-error injection, coverage on `busy` / `data_valid`.
  - See [LEARNING_GUIDE_PROTOCOLS_AND_UVM.md § 6](LEARNING_GUIDE_PROTOCOLS_AND_UVM.md#6-uart-uvm-mapping-module-4).
  notes: From MODULE4 Verification & Testing Methods.
- type: section
  title: Syllabus topics
- type: bullets
  title: 1. UART protocol recap (8N1)
  bullets:
  - One byte = start (0) + 8 data (LSB first) + stop (1); `baud_tick` times each bit.
  - Driver/monitor must follow the same rules as the RTL.
  notes: From MODULE4 Topics Covered.
- type: bullets
  title: 2. Toolchain
  bullets:
  - Verilator `-sv`, `--timing`, UVM includes; `make SIM=verilator TEST=test_uart_uvm`;
    `+UVM_TESTNAME=UartTxTest`.
  notes: From MODULE4 Topics Covered.
