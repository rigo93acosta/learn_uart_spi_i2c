- type: section
  title: Syllabus topics
- type: bullets
  title: 1. UART UVM Agent
  bullets:
  - 'Transaction (UartTxTransaction): byte to send (data); monitor fills observed_tx
    (reconstructed from serial line).'
  - 'Sequence (UartTxSequence): produces directed transactions (0x00, 0x01, 0x55,
    0xAA, 0xFF).'
  - 'Driver (UartTxDriver): gets transaction, drives start and data for one cycle,
    waits 10 baud_ticks (one frame).'
  - 'Monitor (UartTxMonitor): watches tx line for start bit, samples 8 data bits per
    baud_tick, writes transaction to scoreboard.'
  - 'Scoreboard (UartTxScoreboard): compares expected (from test) vs observed_tx (from
    monitor); also check_rx_byte for loopback RX.'
  notes: From MODULE4 Topics Covered.
- type: bullets
  title: 2. Loopback and RX Check
  bullets:
  - 'Loopback: TX output (vif.tx) is connected to RX input (dut_rx.rx). Bytes sent
    by driver are received by uart_rx.'
  - 'RX hook: An initial block in the top looks up the scoreboard and calls check_rx_byte(rx_data)
    when rx_valid is high, so both TX path...'
  notes: From MODULE4 Topics Covered.
- type: bullets
  title: 3. Toolchain
  bullets:
  - 'Same as Module 2: Verilator with -sv, --timing, --trace, UVM include paths, make
    SIM=verilator TEST=test_uart_uvm. Run with...'
  notes: From MODULE4 Topics Covered.
