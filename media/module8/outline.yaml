title: Module 8 — I²C — UVM+SV Verification
course: learn_uart_spi_i2c
module: 8
subtitle: Extend I²C verification to **UVM+SV** — I²C agent (transaction, sequence,
  driver, monitor, scoreboard); run on Verilator.
footer: learn_uart_spi_i2c / Module 8
slides:
- type: title
  title: Module 8
  subtitle: I²C — UVM+SV Verification
- type: bullets
  title: Learning objectives
  bullets:
  - 'I²C UVM agent: I2cTransaction, I2cSequence, I2cDriver, I2cMonitor, I2cScoreboard.'
  - 'Interface: i2c_if (clk, rst_n, start, addr, data_in, scl, sda, clk_div_tick,
    busy, done) connects UVM to DUT.'
  - How to hook up a UVM monitor and scoreboard to a bus-oriented DUT.
- type: bullets
  title: Prerequisites
  bullets:
  - Module 7 (I²C protocol + RTL + basic TB).
  - Verilator, Make, C++ compiler, UVM (UVM_HOME or vendored UVM).
