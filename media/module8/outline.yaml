- type: section
  title: Syllabus topics
- type: bullets
  title: 1. I²C UVM Agent
  bullets:
  - 'Transaction (I2cTransaction): address and data to write; monitor fills observed_addr/observed_data.'
  - 'Sequence (I2cSequence): produces directed transactions (e.g. same addr, different
    data bytes).'
  - 'Driver (I2cDriver): gets transaction, drives start/addr/data_in for one cycle,
    waits for done.'
  - 'Monitor (I2cMonitor): watches SCL/SDA; after START, samples SDA on rising SCL
    to reconstruct 8 bits of address+W and 8 bits of data.'
  - 'Scoreboard (I2cScoreboard): compares expected (from test) vs observed_addr/observed_data.'
  notes: From MODULE8 Topics Covered.
- type: bullets
  title: 2. Toolchain
  bullets:
  - 'Same as Module 6 (SPI UVM): Verilator with -sv, --timing, --trace, UVM include
    paths, `make SIM=verilator TEST=test_i2c_uvm`. Run with...'
  notes: From MODULE8 Topics Covered.
