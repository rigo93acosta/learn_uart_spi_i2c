- type: bullets
  title: 1. DUT and interface
  bullets:
  - 'simple_register.v: `enable`, `d`, `q` — minimal storage for learning UVM data
    flow.'
  - 'reg_if: virtual interface bundling `clk`, `rst_n`, `enable`, `d`, `q` for the
    agent.'
  notes: From MODULE2 Design Architecture.
- type: bullets
  title: 2. UVM component hierarchy
  bullets:
  - RegTransaction → one write operation (data + enable + observed q).
  - RegSequence → stream of directed transactions.
  - RegDriver / RegMonitor → drive pins / sample pins each cycle.
  - RegScoreboard → expected queue vs observed.
  - RegAgent, RegEnv, RegTest — standard UVM layering used again in Modules 4, 6,
    8.
  notes: From MODULE2 Design Architecture.
- type: bullets
  title: 3. Build and simulation flow
  bullets:
  - Verilator compiles SV + UVM + C++; `+UVM_TESTNAME` selects the test.
  - 'Phases: build → connect → run (objections hold simulation until sequence completes).'
  notes: From MODULE2 Design Architecture.
- type: section
  title: Verification & testing methods
- type: image
  title: Testing and closure flow
  image: assets/diagrams/testing_methods.png
  caption: 'Module 2: how tests, checks, and metrics close verification goals.'
- type: bullets
  title: 1. Transaction-level verification
  bullets:
  - Stimulus is a transaction (what to write), not raw pin wiggles in `initial` blocks.
  - The monitor reconstructs what happened on the bus; the scoreboard compares to
    expected.
  notes: From MODULE2 Verification & Testing Methods.
- type: bullets
  title: 2. Directed regression in uvm_smoke
  bullets:
  - 'Fixed sequence: 0x00, 0x01, 0x55, 0xAA, 0xFF — repeatable, easy to debug.'
  - 'Pass criteria: scoreboard reports matches, zero mismatches.'
  notes: From MODULE2 Verification & Testing Methods.
- type: bullets
  title: 3. Skills you reuse on UART/SPI/I²C
  bullets:
  - Same agent pattern; only the transaction and protocol timing in driver/monitor
    change.
  - 'Read UVM log lines: DRIVER, MONITOR, SCOREBOARD, final summary.'
  notes: From MODULE2 Verification & Testing Methods.
- type: section
  title: Syllabus topics
- type: bullets
  title: 1. Basic Testbench (Directed Tests, Pin Wiggling)
  bullets:
  - 'Directed test: Drive specific inputs (e.g., reset, then a fixed sequence of data)
    and check expected outputs (e.g., register value, count).'
  - 'Pin wiggling: The testbench directly drives and samples DUT pins (clock, reset,
    data, enable) — no transaction layer yet.'
  notes: From MODULE2 Topics Covered.
- type: bullets
  title: 2. Evolution to UVM+SV Testbench
  bullets:
  - 'Sequence: Produces a stream of transactions (e.g., a few directed values: 0x00,
    0x01, 0x55, 0xAA, 0xFF). Can be deterministic (directed) or random (later).'
  - 'Driver: Gets transactions from the sequencer and drives the DUT interface (e.g.,
    set enable and d on the bus, wait for clock).'
  - 'Monitor: Observes the DUT interface and turns pin activity into transactions,
    then sends them to the scoreboard via an analysis port.'
  - 'Scoreboard: Compares “expected” (what we sent) vs “observed” (what the monitor
    saw). Reports matches/mismatches.'
  - 'Agent: Groups driver, monitor, and sequencer for one interface. Env: Contains
    agent(s) and scoreboard. Test: Builds the env, starts the sequence, raises/drops
    objections.'
  notes: From MODULE2 Topics Covered.
- type: bullets
  title: 3. Toolchain (Verilator, UVM_HOME, Make)
  bullets:
  - 'Verilator: Compiles SystemVerilog (including UVM) + C++ into an executable. Key
    flags: `-sv`, `--timing`, `--trace`, `--binary`, include paths for UVM.'
  - 'UVM_HOME: Points to the UVM library root; the build uses `$(UVM_HOME)/src/uvm_pkg.sv`
    and `+incdir+$(UVM_HOME)/src`. If not set, the uvm_smoke Makefile can fall back
    to a vendored UVM under `tools/`.'
  - 'Make: One target to compile (Verilator + make in obj_dir), one to run (`./obj_dir/Vtest_uvm_smoke
    +UVM_TESTNAME=...`). Same pattern for UART/SPI/I²C UVM tests later.'
  notes: From MODULE2 Topics Covered.
