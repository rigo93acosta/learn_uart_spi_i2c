- type: section
  title: Syllabus topics
- type: bullets
  title: 1. Basic Testbench (Directed Tests, Pin Wiggling)
  bullets:
  - 'Directed test: Drive specific inputs (e.g., reset, then a fixed sequence of data)
    and check expected outputs (e.g., register value, count).'
  - 'Pin wiggling: The testbench directly drives and samples DUT pins (clock, reset,
    data, enable) — no transaction layer yet.'
  notes: From MODULE2 Topics Covered.
- type: bullets
  title: 2. Evolution to UVM+SV Testbench
  bullets:
  - 'Sequence: Produces a stream of transactions (e.g., a few directed values: 0x00,
    0x01, 0x55, 0xAA, 0xFF). Can be deterministic (directed)...'
  - 'Driver: Gets transactions from the sequencer and drives the DUT interface (e.g.,
    set enable and d on the bus, wait for clock).'
  - 'Monitor: Observes the DUT interface and turns pin activity into transactions,
    then sends them to the scoreboard via an analysis port.'
  - 'Scoreboard: Compares “expected” (what we sent) vs “observed” (what the monitor
    saw). Reports matches/mismatches.'
  - 'Agent: Groups driver, monitor, and sequencer for one interface. Env: Contains
    agent(s) and scoreboard. Test: Builds the env, starts the...'
  notes: From MODULE2 Topics Covered.
- type: bullets
  title: 3. Toolchain (Verilator, UVM_HOME, Make)
  bullets:
  - 'Verilator: Compiles SystemVerilog (including UVM) + C++ into an executable. Key
    flags: `-sv`, `--timing`, `--trace`, `--binary`, include...'
  - 'UVM_HOME: Points to the UVM library root; the build uses `$(UVM_HOME)/src/uvm_pkg.sv`
    and `+incdir+$(UVM_HOME)/src`. If not set, the...'
  - 'Make: One target to compile (Verilator + make in obj_dir), one to run (`./obj_dir/Vtest_uvm_smoke
    +UVM_TESTNAME=...`). Same pattern for...'
  notes: From MODULE2 Topics Covered.
