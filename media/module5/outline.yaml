title: Module 5 — SPI — Protocol + RTL + Basic Testbench
course: learn_uart_spi_i2c
module: 5
subtitle: Understand the SPI protocol (mode 0, signals), translate it to RTL (SPI
  master, clk_div), and verify with a **basic** (non-UVM) directed testbench.
footer: learn_uart_spi_i2c / Module 5
slides:
- type: title
  title: Module 5
  subtitle: SPI — Protocol + RTL + Basic Testbench
- type: bullets
  title: Learning objectives
  bullets:
  - 'SPI mode 0: SCLK idle low; capture on rising edge; change on falling edge; CS_N
    active low for frame.'
  - 'RTL block architecture: `clk_div` + `spi_master` hierarchy, FSM, and Mode 0 timing
    on the wire.'
  - 'Baseline verification: Directed stimulus, `done`-based checks, and optional waveform
    review (8 SCLK edges, MSB first).'
  - 'Path to Module 6: Same DUT, UVM agent with bus monitor on SCLK/MOSI/CS_N.'
- type: bullets
  title: Prerequisites
  bullets:
  - Modules 1–4 (spec→RTL, UVM, UART baseline, UART UVM).
  - Verilator, Make, C++ compiler. No UVM required for spi_baseline.
