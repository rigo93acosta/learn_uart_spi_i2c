- type: section
  title: Design architecture
- type: image
  title: RTL / block architecture
  image: assets/diagrams/rtl_architecture.png
  caption: 'Module 5: DUT / block hierarchy (see module5/examples/).'
- type: image
  title: Verification environment architecture
  image: assets/diagrams/verification_architecture.png
  caption: 'Module 5: UVM layers, agents, and checkers for this phase.'
- type: bullets
  title: 1. Block hierarchy
  bullets:
  - top_spi_baseline → `clk_div` + `spi_master`; C++ supplies `clk`/`rst_n`.
  notes: From MODULE5 Design Architecture.
- type: bullets
  title: 2. SPI master RTL
  bullets:
  - 'clk_div: `clk_div_tick` every `DIVIDER` clocks.'
  - 'spi_master: Mode 0; `cs_n` frames; MSB-first on `mosi`; `done` when complete.'
  - 'Outputs: `sclk` (idle low), `mosi`, `cs_n` — no `miso` in baseline.'
  notes: From MODULE5 Design Architecture.
- type: bullets
  title: 3. Mode 0 timing on the wire
  bullets:
  - Capture on rising SCLK; change MOSI on falling SCLK; 8 edges per byte.
  notes: From MODULE5 Design Architecture.
- type: section
  title: Verification & testing methods
- type: image
  title: Testing and closure flow
  image: assets/diagrams/testing_methods.png
  caption: 'Module 5: how tests, checks, and metrics close verification goals.'
- type: bullets
  title: 1. Baseline goals
  bullets:
  - Confirm Mode 0 serialization before SPI UVM (Module 6).
  notes: From MODULE5 Verification & Testing Methods.
- type: bullets
  title: 2. Directed test flow
  bullets:
  - Pulse `start` + `data_in` (0x55, 0xAA); `wait(done)`; read `[PASS]` messages.
  notes: From MODULE5 Verification & Testing Methods.
- type: bullets
  title: 3. Waveform learning (optional)
  bullets:
  - Count 8 SCLK cycles per frame; verify MSB-first bit order on MOSI.
  - Defer MISO, multi-slave CS, and random data to Module 6.
  notes: From MODULE5 Verification & Testing Methods.
- type: section
  title: Syllabus topics
- type: bullets
  title: 1. SPI Protocol (Mode 0)
  bullets:
  - 'Signals: sclk (serial clock), mosi (master out, slave in), cs_n (active-low chip
    select). Optional: miso (not used in this baseline).'
  - 'Mode 0 (CPOL=0, CPHA=0): SCLK idles low; data captured on rising edge; data changed
    on falling edge.'
  - 'Timing: One bit per clk_div_tick; clk_div_tick derived from system clock via
    divider (e.g. DIVIDER=8).'
  notes: From MODULE5 Topics Covered.
- type: bullets
  title: 2. Hands-on testbench (spi_baseline)
  bullets:
  - 'Directed test in `top_spi_baseline.sv`: `start`, `data_in`, `wait(done)`.'
  - 'Pass: `[PASS]` lines and `SPI baseline test PASS`.'
  notes: From MODULE5 Topics Covered.
