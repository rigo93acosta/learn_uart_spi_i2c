title: Module 5 — SPI — Protocol + RTL + Basic Testbench
course: learn_uart_spi_i2c
module: 5
subtitle: Understand the SPI protocol (mode 0, signals), translate it to RTL (SPI
  master, clk_div), and verify with a **basic** (non-UVM) directed testbench.
footer: learn_uart_spi_i2c / Module 5
slides:
- type: title
  title: Module 5
  subtitle: SPI — Protocol + RTL + Basic Testbench
- type: bullets
  title: Learning objectives
  bullets:
  - 'SPI mode 0: SCLK idle low; capture on rising edge; change on falling edge; CS_N
    active low for frame.'
  - 'Signals: sclk, mosi, cs_n; clk_div_tick for timing (no MISO in this baseline).'
  - 'RTL architecture: spi_master (start, data_in → sclk, mosi, cs_n, done); clk_div
    (divider → clk_div_tick).'
  - 'Basic TB: Directed transfers (e.g. 0x55, 0xAA); wait for done; no UVM.'
- type: bullets
  title: Prerequisites
  bullets:
  - Modules 1–4 (spec→RTL, UVM, UART baseline, UART UVM).
  - Verilator, Make, C++ compiler. No UVM required for spi_baseline.
- type: image
  title: Learning path
  image: assets/diagrams/learning_path.png
  caption: Understand the SPI protocol (mode 0, signals), translate it to RTL (SPI
    master, clk_div), and verify with a **basic** (non-UVM) directed testbench.
- type: bullets
  title: Overview
  bullets:
  - 'Module 5 is the second **protocol** module (after UART):'
- type: section
  title: Syllabus topics
- type: bullets
  title: 1. SPI Protocol (Mode 0)
  bullets:
  - 'Signals: sclk (serial clock), mosi (master out, slave in), cs_n (active-low chip
    select). Optional: miso (not used in this baseline).'
  - 'Mode 0 (CPOL=0, CPHA=0): SCLK idles low; data captured on rising edge; data changed
    on falling edge.'
  - 'Timing: One bit per clk_div_tick; clk_div_tick derived from system clock via
    divider (e.g. DIVIDER=8).'
  notes: From MODULE5 Topics Covered.
- type: bullets
  title: 2. RTL Architecture
  bullets:
  - 'clk_div: Divides clk; outputs clk_div_tick one cycle every DIVIDER cycles.'
  - 'spi_master: On start, loads data_in into shift register; asserts cs_n low; toggles
    sclk on clk_div_tick; outputs one bit per half-cycle...'
  notes: From MODULE5 Topics Covered.
- type: bullets
  title: 3. Basic Testbench
  bullets:
  - 'Directed test: Reset release; start=1, data_in=0x55; wait for done; repeat for
    0xAA; $finish. Implemented in top_spi_baseline.sv...'
  notes: From MODULE5 Topics Covered.
