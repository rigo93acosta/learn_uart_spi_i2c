- type: section
  title: Design architecture
- type: image
  title: RTL / block architecture
  image: assets/diagrams/rtl_architecture.png
  caption: 'Module 6: DUT / block hierarchy (see module6/examples/).'
- type: image
  title: Verification environment architecture
  image: assets/diagrams/verification_architecture.png
  caption: 'Module 6: UVM layers, agents, and checkers for this phase.'
- type: bullets
  title: 1. SPI DUT (reused from Module 5)
  bullets:
  - spi_master + clk_div in `module6/examples/spi_uvm/dut/`.
  - spi_master_if connects UVM to DUT pins.
  notes: From MODULE6 Design Architecture.
- type: bullets
  title: 2. UVM agent structure
  bullets:
  - SpiTransaction = one byte; SpiSequence = directed list; SpiDriver waits on `done`.
  - SpiMonitor samples MOSI on rising SCLK while `cs_n` is low (Mode 0, MSB first).
  - SpiScoreboard compares expected vs `observed_mosi`.
  notes: From MODULE6 Design Architecture.
- type: bullets
  title: 3. Bus vs DUT checking
  bullets:
  - Monitor validates wire behavior; `done` alone is not sufficient for sign-off.
  notes: From MODULE6 Design Architecture.
- type: section
  title: Verification & testing methods
- type: image
  title: Testing and closure flow
  image: assets/diagrams/testing_methods.png
  caption: 'Module 6: how tests, checks, and metrics close verification goals.'
- type: bullets
  title: 1. Mode 0 in the testbench
  bullets:
  - Monitor must use rising-edge capture and falling-edge change — matches CPOL/CPHA=0.
  notes: From MODULE6 Verification & Testing Methods.
- type: bullets
  title: 2. Directed regression
  bullets:
  - Same byte pattern as UART UVM (0x00 … 0xFF) for apples-to-apples learning.
  notes: From MODULE6 Verification & Testing Methods.
- type: bullets
  title: 3. Extensions
  bullets:
  - MISO reads, random data, mode parameters — see [LEARNING_GUIDE § 7](LEARNING_GUIDE_PROTOCOLS_AND_UVM.md#7-spi-uvm-mapping-module-6).
  notes: From MODULE6 Verification & Testing Methods.
- type: section
  title: Syllabus topics
- type: bullets
  title: 1. SPI protocol recap (Mode 0)
  bullets:
  - '`cs_n` frames; 8 SCLK cycles per byte; MSB first on MOSI.'
  notes: From MODULE6 Topics Covered.
- type: bullets
  title: 2. Toolchain
  bullets:
  - '`make SIM=verilator TEST=test_spi_uvm`; `+UVM_TESTNAME=SpiTest`.'
  notes: From MODULE6 Topics Covered.
