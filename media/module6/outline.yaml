title: Module 6 — SPI — UVM+SV Verification
course: learn_uart_spi_i2c
module: 6
subtitle: Extend SPI verification to **UVM+SV** — SPI agent (transaction, sequence,
  driver, monitor, scoreboard); run on Verilator.
footer: learn_uart_spi_i2c / Module 6
slides:
- type: title
  title: Module 6
  subtitle: SPI — UVM+SV Verification
- type: bullets
  title: Learning objectives
  bullets:
  - 'SPI UVM agent: Transaction (SpiTransaction), sequence (SpiSequence), driver (SpiDriver),
    monitor (SpiMonitor), scoreboard (SpiScoreboard).'
  - 'Interface: spi_master_if (clk, rst_n, clk_div_tick, start, data_in, sclk, mosi,
    cs_n, busy, done) connects UVM to DUT.'
  - 'Mode 0 monitoring: SCLK idle low; capture on rising edge; monitor samples MOSI
    on each rising SCLK, MSB first, to reconstruct the byte.'
- type: bullets
  title: Prerequisites
  bullets:
  - Module 1 (spec → RTL), Module 2 (UVM+SV, uvm_smoke), Module 5 (SPI protocol +
    RTL + basic TB).
  - Verilator, Make, C++ compiler, UVM (UVM_HOME or vendored UVM).
