- type: section
  title: Syllabus topics
- type: bullets
  title: 1. SPI UVM Agent
  bullets:
  - 'Transaction (SpiTransaction): byte to send (data); monitor fills observed_mosi
    (reconstructed from MOSI on SCLK).'
  - 'Sequence (SpiSequence): produces directed transactions (0x00, 0x01, 0x55, 0xAA,
    0xFF).'
  - 'Driver (SpiDriver): gets transaction, drives start and data_in for one cycle,
    waits for done.'
  - 'Monitor (SpiMonitor): watches cs_n; when cs_n goes low, samples MOSI on each
    rising edge of SCLK (mode 0, MSB first), writes transaction...'
  - 'Scoreboard (SpiScoreboard): compares expected (from test) vs observed_mosi (from
    monitor).'
  notes: From MODULE6 Topics Covered.
- type: bullets
  title: 2. Mode 0 Timing
  bullets:
  - 'SPI mode 0: SCLK idles low; data captured on rising edge; data changed on falling
    edge.'
  - 'Monitor: Waits for cs_n low, then on 8 rising edges of SCLK captures MOSI into
    bits [7:0] (MSB first).'
  notes: From MODULE6 Topics Covered.
- type: bullets
  title: 3. Toolchain
  bullets:
  - 'Same as Module 2: Verilator with -sv, --timing, --trace, UVM include paths, make
    SIM=verilator TEST=test_spi_uvm. Run with...'
  notes: From MODULE6 Topics Covered.
