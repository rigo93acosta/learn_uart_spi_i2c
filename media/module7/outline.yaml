- type: bullets
  title: 2. I²C master FSM
  bullets:
  - 'States: IDLE → START → ADDR_BITS → DATA_BITS → STOP.'
  - 'One teaching write: 7-bit `addr` + data byte on `scl`/`sda` (push-pull model).'
