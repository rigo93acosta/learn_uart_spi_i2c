title: Module 7 — I²C — Protocol + RTL + Basic Testbench
course: learn_uart_spi_i2c
module: 7
subtitle: Understand the I²C protocol (start/stop, addressing, ACK/NACK), translate
  it to RTL (simple master + timing), and verify with a **basic** (non-UVM) directed
  testbench.
footer: learn_uart_spi_i2c / Module 7
slides:
- type: title
  title: Module 7
  subtitle: I²C — Protocol + RTL + Basic Testbench
- type: bullets
  title: Learning objectives
  bullets:
  - How START/STOP are detected/produced (SDA transitions while SCL high).
  - How the address + R/W bit and data bytes are serialized on SDA.
  - How to build a basic “bus monitor” that reconstructs bytes by sampling SDA on
    SCL rising edges.
- type: bullets
  title: Prerequisites
  bullets:
  - Modules 1–6.
  - Verilator, Make, C++ compiler. No UVM required for this baseline.
- type: image
  title: Learning path
  image: assets/diagrams/learning_path.png
  caption: Understand the I²C protocol (start/stop, addressing, ACK/NACK), translate
    it to RTL (simple master + timing), and verify with a **basic** (non-UVM) directed
