- type: bullets
  title: Overview
  bullets:
  - Module 7 is the I²C **protocol + RTL + basic testbench** module (UVM comes in
    Module 8).
- type: section
  title: Syllabus topics
- type: bullets
  title: 1. I²C Protocol Essentials
  bullets:
  - 'Bus idle: SCL=1, SDA=1.'
  - 'START: SDA goes 1→0 while SCL is 1.'
  - 'STOP: SDA goes 0→1 while SCL is 1.'
  - 'Address phase: 7-bit address + R/W bit (0=write, 1=read) sent MSB first.'
  - 'Data phase: 8-bit data bytes sent MSB first.'
  - 'ACK/NACK (concept): receiver pulls SDA low for ACK on the 9th clock; high means
    NACK.'
  notes: From MODULE7 Topics Covered.
- type: bullets
  title: 2. RTL Architecture (Baseline)
  bullets:
  - 'clk_div: Divides `clk` to produce `clk_div_tick` used to toggle/advance SCL timing.'
  - 'i2c_master: State machine that generates:'
  - START condition
  - address+W bits
  - one data byte
  - STOP condition
  notes: From MODULE7 Topics Covered.
- type: bullets
  title: 3. Basic Testbench
  bullets:
  - 'Stimulus: Pulses `start`, sets `addr` and `data_in`, waits for `done`.'
  - 'Monitor/self-check: Detects START, then samples SDA on each rising edge of SCL
    to reconstruct:'
  - 8 bits of address+W
  - 8 bits of data
  notes: From MODULE7 Topics Covered.
