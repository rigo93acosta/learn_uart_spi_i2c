- type: bullets
  title: Overview
  bullets:
  - 'Module 1 establishes the **design and verification mindset** you will use for
    UART, SPI, and I²C in later modules:'
- type: section
  title: Syllabus topics
- type: bullets
  title: 1. Specification → RTL Design Flow
  bullets:
  - 'Specification: Document interface (ports, widths, direction), behavior (reset,
    enable, state transitions), and timing (sync/async).'
  - 'RTL: Implement the spec in Verilog/SystemVerilog; each requirement in the spec
    should map to clear RTL (e.g., reset logic, enable...'
  - 'Traceability: Being able to point from a line in the spec to the RTL that implements
    it (and vice versa).'
  notes: From MODULE1 Topics Covered.
- type: bullets
  title: 2. Design Methodology
  bullets:
  - 'Single block: One spec, one (or a few) RTL files, one testbench.'
  - 'Reuse: The same flow (spec → RTL → testbench) scales to protocol blocks (UART,
    SPI, I²C) in Modules 3–8.'
  - 'Documentation: Keep SPEC.md (or similar) next to the RTL so that reviewers and
    verification can check against it.'
  notes: From MODULE1 Topics Covered.
- type: bullets
  title: '3. Intro to Verification: What We Verify, and Why'
  bullets:
  - 'What we verify: That the RTL matches the specification (correct function, reset,
    enable, boundaries like count wrap).'
  - 'Why we verify: Finding bugs in RTL is far cheaper than finding them in silicon
    or in system integration; directed tests (and later UVM)...'
  - 'Directed test: A simple test that drives specific inputs (e.g., reset, then 10
    enabled cycles) and checks expected outputs (e.g., count...'
  notes: From MODULE1 Topics Covered.
