- type: bullets
  title: 1. Artifact flow (spec_to_rtl)
  bullets:
  - SPEC.md → requirements in plain language (interface, behavior, timing).
  - dut/counter.v → synthesizable RTL implementing the spec.
  - top.v → wrapper connecting DUT pins to the simulation harness.
  - sim_main.cpp → clock, reset, stimulus, and result checking outside RTL.
  notes: From MODULE1 Design Architecture.
- type: bullets
  title: 2. Counter DUT structure
  bullets:
  - '8-bit up-counter: increments when `enable` is high; holds when disabled.'
  - 'Reset: synchronous active-low `rst_n` clears `count` to zero.'
  - 'Ports: `clk`, `rst_n`, `enable`, `count[7:0]` — map directly from the spec interface
    table.'
  notes: From MODULE1 Design Architecture.
- type: bullets
  title: 3. Simulation harness attachment
  bullets:
  - C++ generates `clk` and drives `rst_n` / `enable`; reads `count` each cycle.
  - No SystemVerilog testbench yet — you will add structured TB/UVM in Module 2.
  notes: From MODULE1 Design Architecture.
- type: section
  title: Verification & testing methods
- type: image
  title: Testing and closure flow
  image: assets/diagrams/testing_methods.png
  caption: 'Module 1: how tests, checks, and metrics close verification goals.'
- type: bullets
  title: 1. What we verify in Module 1
  bullets:
  - RTL behavior matches SPEC.md (reset, enable gating, count progression).
  - 'Directed scenario: release reset, enable for N cycles, expect `count == N`.'
  notes: From MODULE1 Verification & Testing Methods.
- type: bullets
  title: 2. Stimulus and checking
  bullets:
  - 'Stimulus: C++ toggles `enable` for a known number of clock cycles.'
  - 'Check: compare `count` to expected value; print PASS/FAIL.'
  - 'Traceability: each check should cite the spec sentence it proves.'
  notes: From MODULE1 Verification & Testing Methods.
- type: bullets
  title: 3. What is not covered yet
  bullets:
  - Random stimulus, functional coverage, scoreboards — Module 2 (UVM) and protocol
    modules.
  - Use [UNDERSTANDING_THE_SPEC.md](../module1/UNDERSTANDING_THE_SPEC.md) and [SPEC_TO_RTL_GUIDE.md](../module1/SPEC_TO_RTL_GUIDE.md)
    while tracing the example.
  notes: From MODULE1 Verification & Testing Methods.
- type: section
  title: Syllabus topics
- type: bullets
  title: 1. Specification → RTL Design Flow
  bullets:
  - 'Specification: Document interface (ports, widths, direction), behavior (reset,
    enable, state transitions), and timing (sync/async).'
  - 'RTL: Implement the spec in Verilog/SystemVerilog; each requirement in the spec
    should map to clear RTL (e.g., reset logic, enable gating, counter width).'
  - 'Traceability: Being able to point from a line in the spec to the RTL that implements
    it (and vice versa).'
  notes: From MODULE1 Topics Covered.
- type: bullets
  title: 2. Design Methodology
  bullets:
  - 'Single block: One spec, one (or a few) RTL files, one testbench.'
  - 'Reuse: The same flow (spec → RTL → testbench) scales to protocol blocks (UART,
    SPI, I²C) in Modules 3–8.'
  - 'Documentation: Keep SPEC.md (or similar) next to the RTL so that reviewers and
    verification can check against it.'
  notes: From MODULE1 Topics Covered.
- type: bullets
  title: '3. Intro to Verification: What We Verify, and Why'
  bullets:
  - 'What we verify: That the RTL matches the specification (correct function, reset,
    enable, boundaries like count wrap).'
  - 'Why we verify: Finding bugs in RTL is far cheaper than finding them in silicon
    or in system integration; directed tests (and later UVM) give repeatable, automated
    checks.'
  - 'Directed test: A simple test that drives specific inputs (e.g., reset, then 10
    enabled cycles) and checks expected outputs (e.g., count == 10). The spec_to_rtl
    example is a minimal directed test.'
  notes: From MODULE1 Topics Covered.
