- type: title
  title: Module 1
  subtitle: Design & Verification Methodology (Part 1)
- type: bullets
  title: Learning objectives
  bullets:
  - 'Spec-to-RTL flow: From SPEC.md (or equivalent) to synthesizable Verilog/SystemVerilog.'
  - 'Why verify: The cost of bugs, and how directed tests (and later UVM) reduce risk.'
  - 'Minimal toolchain: Verilator + Make + C++ harness for RTL simulation (no UVM
    in this module).'
- type: bullets
  title: Prerequisites
