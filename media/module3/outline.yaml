- type: bullets
  title: 1. Block hierarchy
  bullets:
  - top_uart_baseline → `baud_gen`, `uart_tx`, `uart_rx`; sim_main.cpp drives `clk`/`rst_n`
    only.
  - 'Loopback: `assign rx = tx` — one wire connects transmitter to receiver.'
  notes: From MODULE3 Design Architecture.
- type: bullets
  title: 2. RTL blocks
  bullets:
  - 'baud_gen: `DIVIDER` → `baud_tick` every N clocks; shared by TX and RX.'
  - 'uart_tx: parallel-in / serial-out; start + 8 data (LSB first) + stop; `busy`
    during frame.'
  - 'uart_rx: start detect, sample per `baud_tick`, `data_valid` + optional `framing_error`.'
  notes: From MODULE3 Design Architecture.
- type: bullets
  title: 3. Timing and clocking
  bullets:
  - Single `clk` domain; async `rst_n`; all bit times referenced to `baud_tick`.
  notes: From MODULE3 Design Architecture.
- type: section
  title: Verification & testing methods
- type: image
  title: Testing and closure flow
  image: assets/diagrams/testing_methods.png
  caption: 'Module 3: how tests, checks, and metrics close verification goals.'
- type: bullets
  title: 1. Verification goals
  bullets:
  - Prove RTL implements UART 8N1 before UVM (Module 4).
  - 'Happy-path loopback: bytes sent on TX appear correctly on RX.'
  notes: From MODULE3 Verification & Testing Methods.
- type: bullets
  title: 2. Baseline directed test
  bullets:
  - 'Stimulus: `initial` block — `start`, `data_in` (0x55, 0xAA).'
  - 'Check: `wait(data_valid)`; compare `data_out`; `$error` / `$display`.'
  - 'No UVM: pin wiggling only — fastest way to learn the protocol on real RTL.'
  notes: From MODULE3 Verification & Testing Methods.
- type: bullets
  title: 3. Coverage gaps (defer to Module 4)
  bullets:
  - Random baud, framing errors, `busy` back-to-back, functional coverage.
  - Map checks to [UART_LEARNING_GUIDE.md](UART_LEARNING_GUIDE.md) spec bullets.
  notes: From MODULE3 Verification & Testing Methods.
- type: section
  title: Syllabus topics
- type: bullets
  title: 1. UART Protocol (8N1) (1/4)
  bullets:
  - 'Signals: Serial line (tx/rx), idle high; system clock; baud_tick (one pulse per
    bit time).'
  - 'Frame: 1 start bit (0), 8 data bits (LSB first), 1 stop bit (1).'
  - 'Timing: One bit per baud_tick; baud_tick derived from system clock via a divider
    (e.g. DIVIDER = clk_freq / baud_rate).'
  - 'Framing: `idle=1` → `start=0` → 8 data bits (LSB first) → `stop=1`.'
  - 'Baud math: `DIVIDER = round(clk_hz / baud)`. Example: 50 MHz clock, 115200 baud
    → divider ≈ 434.'
  - 'Reset state: Line idles high, TX not busy, RX clears internal shift register,
    `data_valid` low.'
  notes: From MODULE3 Topics Covered.
- type: bullets
  title: 1. UART Protocol (8N1) (2/4)
  bullets:
  - 'Errors: `framing_error` when stop bit is not high at expected sample; optional
    `parity_error` if parity enabled (not used in 8N1 baseline).'
  - 'Inputs: `clk`, `rst_n`, `baud_tick`, `start`, `data_in[7:0]`.'
  - 'Outputs: `tx`, `busy`.'
  - 'Behavior: On `start`, latch `data_in`, drive start bit low, then shift out bits
    [0:7] each `baud_tick`, then drive stop bit high for one `baud_tick`. Deassert
    `busy` after stop bit.'
  - 'Edge cases: Ignore `start` while `busy` (or queue it in a FIFO if you extend
    the design).'
  - 'Inputs: `clk`, `rst_n`, `baud_tick`, `rx`.'
  notes: From MODULE3 Topics Covered.
- type: bullets
  title: 1. UART Protocol (8N1) (3/4)
  bullets:
  - 'Outputs: `data_out[7:0]`, `data_valid` (pulse), `framing_error`.'
  - 'Robustness options: Add metastability sync on `rx`; add oversampling + majority
    vote; add `rx_ready`/`rx_valid` handshake if you later connect to a FIFO.'
  - 'Inputs: `clk`, `rst_n`, `divisor` (constant parameter in the baseline).'
  - 'Output: `baud_tick` high for one cycle every `divisor` clocks.'
  - For synthesis, keep the counter simple (`divisor-1` down-counter or up-counter
    compare). For sim, you can parametrize `divisor` to speed up runs.
  - 'Data bits: 5–9 data bits are common.'
  notes: From MODULE3 Topics Covered.
- type: bullets
  title: 1. UART Protocol (8N1) (4/4)
  bullets:
  - 'Parity: Even/odd/mark/space; adds a parity bit before stop.'
  - 'Stop bits: 1 or 2 stop bits.'
  - 'Flow control: RTS/CTS hardware pins (outside the serial line) to throttle traffic.'
  - The baseline RTL assumes 8N1 with no parity and no flow control.
  notes: From MODULE3 Topics Covered.
- type: bullets
  title: 2. Hands-on testbench (uart_baseline)
  bullets:
  - 'Loopback: Connect TX output to RX input; send bytes from TX, check they appear
    on RX.'
  - 'Directed test: Reset release, send 0x55 and 0xAA, wait for `data_valid`, check
    `data_out`. Implemented in `top_uart_baseline.sv` (initial block) and C++ (clk,
    rst_n); no UVM.'
  - 'Self-check flow: `wait(rst_n)` → pulse `start`/`data_in` → `wait(!busy)` → `wait(data_valid)`
    → compare `data_out` → repeat → `$finish`.'
  notes: From MODULE3 Topics Covered.
