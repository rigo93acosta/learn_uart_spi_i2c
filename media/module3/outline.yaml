- type: section
  title: Syllabus topics
- type: bullets
  title: 1. UART Protocol (8N1) (1/4)
  bullets:
  - 'Signals: Serial line (tx/rx), idle high; system clock; baud_tick (one pulse per
    bit time).'
  - 'Frame: 1 start bit (0), 8 data bits (LSB first), 1 stop bit (1).'
  - 'Timing: One bit per baud_tick; baud_tick derived from system clock via a divider
    (e.g. DIVIDER = clk_freq / baud_rate).'
  - 'Framing: `idle=1` → `start=0` → 8 data bits (LSB first) → `stop=1`.'
  - 'Baud math: `DIVIDER = round(clk_hz / baud)`. Example: 50 MHz clock, 115200 baud
    → divider ≈ 434.'
  - 'Reset state: Line idles high, TX not busy, RX clears internal shift register,
    `data_valid` low.'
  notes: From MODULE3 Topics Covered.
- type: bullets
  title: 1. UART Protocol (8N1) (2/4)
  bullets:
  - 'Errors: `framing_error` when stop bit is not high at expected sample; optional
    `parity_error` if parity enabled (not used in 8N1 baseline).'
  - 'Inputs: `clk`, `rst_n`, `baud_tick`, `start`, `data_in[7:0]`.'
  - 'Outputs: `tx`, `busy`.'
  - 'Behavior: On `start`, latch `data_in`, drive start bit low, then shift out bits
    [0:7] each `baud_tick`, then drive stop bit high for one...'
  - 'Edge cases: Ignore `start` while `busy` (or queue it in a FIFO if you extend
    the design).'
  - 'Inputs: `clk`, `rst_n`, `baud_tick`, `rx`.'
  notes: From MODULE3 Topics Covered.
- type: bullets
  title: 1. UART Protocol (8N1) (3/4)
  bullets:
  - 'Outputs: `data_out[7:0]`, `data_valid` (pulse), `framing_error`.'
  - 'Robustness options: Add metastability sync on `rx`; add oversampling + majority
    vote; add `rx_ready`/`rx_valid` handshake if you later...'
  - 'Inputs: `clk`, `rst_n`, `divisor` (constant parameter in the baseline).'
  - 'Output: `baud_tick` high for one cycle every `divisor` clocks.'
  - For synthesis, keep the counter simple (`divisor-1` down-counter or up-counter
    compare). For sim, you can parametrize `divisor` to speed...
  - 'Data bits: 5–9 data bits are common.'
  notes: From MODULE3 Topics Covered.
- type: bullets
  title: 1. UART Protocol (8N1) (4/4)
  bullets:
  - 'Parity: Even/odd/mark/space; adds a parity bit before stop.'
  - 'Stop bits: 1 or 2 stop bits.'
  - 'Flow control: RTS/CTS hardware pins (outside the serial line) to throttle traffic.'
  - The baseline RTL assumes 8N1 with no parity and no flow control.
  notes: From MODULE3 Topics Covered.
- type: bullets
  title: 2. RTL Architecture
  bullets:
  - 'baud_gen: Divides `clk`; outputs `baud_tick` one cycle every DIVIDER cycles.'
  - 'uart_tx: On `start`, loads `data_in` into shift register; outputs one bit per
    `baud_tick` (start, data[0:7], stop); asserts `busy`...'
  - 'uart_rx: Detects start bit (line low), samples one bit per `baud_tick`, reconstructs
    byte; pulses `data_valid` and outputs `data_out`...'
  notes: From MODULE3 Topics Covered.
- type: bullets
  title: 3. Basic Testbench
  bullets:
  - 'Loopback: Connect TX output to RX input; send bytes from TX, check they appear
    on RX.'
  - 'Directed test: Reset release, send 0x55 and 0xAA, wait for `data_valid`, check
    `data_out`. Implemented in `top_uart_baseline.sv`...'
  notes: From MODULE3 Topics Covered.
